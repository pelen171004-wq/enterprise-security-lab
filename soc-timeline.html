<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOC Attack Timeline</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#0b1220;
color:white;
font-family:'Inter',sans-serif;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.timeline{
margin-top:40px;
text-align:left;
}

.event{
background:#111827;
border:1px solid #334155;
border-radius:8px;
padding:15px;
margin-bottom:15px;
}

.time{
color:#94a3b8;
font-size:14px;
}

.alert{
color:#ef4444;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h1>SOC Attack Timeline</h1>

<div class="timeline">

<div class="event">
<div class="time">12:41:05</div>
Guest VLAN device initiated connection to Users VLAN
</div>

<div class="event">
<div class="time">12:41:06</div>
Firewall inspection triggered
</div>

<div class="event alert">
<div class="time">12:41:06</div>
BLOCKED — Policy violation
</div>

<div class="event">
<div class="time">12:41:07</div>
Event logged in monitoring system
</div>

</div>

</div>
</body>
</html>
